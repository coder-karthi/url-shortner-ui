<p>home loading</p>

<div class="container">
  <h1>URL Shortner</h1>

  <input 
    [(ngModel)]="longUrl"
    (ngModelChange)="onLongUrlChange()"
    placeholder="Paste your long URL"
  />

  <button (click)="generate()">
    {{ loading() ? 'Generating...' : 'Shorten' }}
  </button>

  @if (shortUrl()){
    <div class="result">
        <a [href]="shortUrl()" target="_blank">{{ shortUrl() }}</a>
        <br>
        <button (click)="copy()">Copy</button>
    </div>
  }
</div>
